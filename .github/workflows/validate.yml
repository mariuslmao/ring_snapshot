name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile Python files
        run: python -m compileall custom_components/ring_snapshot

      - name: Validate JSON files
        run: |
          python -m json.tool custom_components/ring_snapshot/manifest.json > /dev/null
          python -m json.tool custom_components/ring_snapshot/strings.json > /dev/null
          python -m json.tool custom_components/ring_snapshot/translations/en.json > /dev/null
          python -m json.tool hacs.json > /dev/null
